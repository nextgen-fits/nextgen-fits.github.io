<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FN2QCCZ8TL"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config', 'G-FN2QCCZ8TL');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streetwear Lookbooks & Capsule Wardrobes | NextGen Essentials</title>
    <meta name="description" content="Premium heavyweight streetwear lookbooks, boxy drop shoulder hoodies wardrobe, and men minimalist capsule capsule fashion.">
    <style>
        :root { --bg-color: #000000; --accent-gold: #d4af37; --text-main: #ffffff; --text-muted: #8e8e93; --card-bg: #09090b; --border-color: #1c1c1e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .nav-container { max-width: 1000px; margin: 0 auto; padding: 0 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; text-decoration: none; font-size: 0.85em; }
        .nav-logo span { color: var(--accent-gold); }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-left: 15px; }
        .nav-links a.active { color: #fff; border-bottom: 1px solid var(--accent-gold); }
        
        .container { max-width: 700px; margin: 0 auto; padding: 100px 20px 60px 20px; }
        .seo-intro { margin-bottom: 50px; text-align: center; }
        .seo-intro h1 { font-size: 1.8em; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .seo-intro p { color: var(--text-muted); font-size: 0.85em; letter-spacing: 0.5px; }

        /* 📸 高清画册全幅瀑布流 */
        .look-card { background: transparent; border: 1px solid var(--border-color); margin-bottom: 60px; padding: 15px; }
        .look-img-box { width: 100%; overflow: hidden; background: #000; margin-bottom: 20px; }
        .look-img-box img { width: 100%; height: auto; object-fit: cover; filter: brightness(85%); }
        .look-season { font-size: 0.65em; font-weight: 700; color: var(--accent-gold); letter-spacing: 3px; display: block; margin-bottom: 10px; text-transform: uppercase; }
        .look-desc { color: #d1d1d6; font-size: 0.85em; line-height: 1.6; text-align: justify; margin-bottom: 25px; }
        
        .breakdown-box { background: var(--card-bg); border-top: 2px solid #fff; padding: 20px; }
        .breakdown-title { font-size: 0.65em; font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .breakdown-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1c1c1e; }
        .breakdown-item:last-child { border-bottom: none; }
        .breakdown-name { font-size: 0.75em; color: var(--text-muted); font-weight: 500; }
        .breakdown-btn { color: #fff; text-decoration: none; font-size: 0.7em; font-weight: 700; border-bottom: 1px solid #fff; padding-bottom: 2px; text-transform: uppercase; white-space: nowrap; margin-left: 10px; }

        @media screen and (min-width: 769px) {
            .seo-intro h1 { font-size: 2.2em; }
            .breakdown-btn:hover { color: var(--accent-gold); border-color: var(--accent-gold); }
        }
        footer { text-align: center; padding: 40px 0; font-size: 0.65em; color: var(--text-muted); border-top: 1px solid var(--border-color); letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">NextGen <span>Essentials</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="watches.html">Watches</a>
                <a href="apparel.html" class="active">Apparel</a>
                <a href="gear.html">Gear</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="seo-intro">
            <h1>STREETWEAR LOOKBOOK CAPSULE</h1>
            <p>Deconstructing minimal aesthetics, heavy-density premium textiles, and functional urban silhouettes.</p>
        </div>
        <div id="apparel-feed-container"></div>
        <footer><p>&copy; 2026 NextGen Essentials. Apparel Portfolio.</p></footer>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("apparel-feed-container");
            fetch('database/apparel.json?v=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = "";
                    data.forEach(look => {
                        let piecesHTML = "";
                        if(look.breakdown) {
                            look.breakdown.forEach(item => {
                                piecesHTML += `
                                    <div class="breakdown-item">
                                        <span class="breakdown-name">${item.piece}</span>
                                        <a href="${item.url}" class="breakdown-btn" target="_blank">View Item →</a>
                                    </div>
                                `;
                            });
                        }
                        container.innerHTML += `
                            <div class="look-card">
                                <div class="look-img-box"><img src="${look.look_img}" alt="Streetwear Look" loading="lazy"></div>
                                <span class="look-season">${look.season}</span>
                                <p class="look-desc">${look.description}</p>
                                <div class="breakdown-box">
                                    <div class="breakdown-title">OUTFIT PIECES DECONSTRUCTED</div>
                                    ${piecesHTML}
                                </div>
                            </div>
                        `;
                    });
                }).catch(err => { container.innerHTML = "<p>Loading Capsule Portfolio...</p>"; });
        });
    </script>
</body>
</html>
