<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscribe — NextGen Essentials</title>
    <meta name="description" content="Subscribe to the NextGen Essentials newsletter — one email a week, no spam, just honest gear reviews." />
    <link rel="canonical" href="https://nxgenpicks.com/subscribe.html" />

    <!-- 页面样式 -->
    <style>
        /* ── 全局变量（和你其他页面保持一致） ── */
        :root {
            --ink: #0A0A0B;
            --gold: #C9A961;
            --steel: #6B6D70;
            --line: #232325;
            --card: #111113;
        }

        /* ── 重置 & 基础 ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--ink);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 订阅卡片 ── */
        .subscribe-card {
            max-width: 480px;
            width: 100%;
            background: var(--card);
            border: 1px solid var(--line);
            padding: 48px 40px;
            border-radius: 4px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .subscribe-card:hover {
            border-color: rgba(201, 169, 97, 0.3);
        }

        /* ── Logo ── */
        .logo {
            font-family: "Fraunces", Georgia, serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }

        .logo span {
            color: var(--gold);
        }

        /* ── 标题 & 描述 ── */
        .sub-title {
            font-family: "Fraunces", Georgia, serif;
            font-size: 1.6rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 6px;
        }

        .sub-desc {
            color: var(--steel);
            font-size: 0.92rem;
            margin-bottom: 32px;
        }

        /* ── 表单 ── */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--steel);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            background: var(--ink);
            border: 1px solid var(--line);
            padding: 12px 16px;
            color: #fff;
            font-size: 0.92rem;
            font-family: inherit;
            border-radius: 2px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.12);
        }

        .form-group input::placeholder {
            color: #3D3D40;
        }

        /* ── 提交按钮 ── */
        .submit-btn {
            width: 100%;
            background: var(--gold);
            border: none;
            color: #000;
            padding: 14px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s ease, transform 0.15s ease;
            margin-top: 4px;
        }

        .submit-btn:hover {
            background: #D9B971;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ── 底部链接 ── */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--steel);
            font-size: 0.78rem;
            text-decoration: none;
            transition: color 0.2s ease;
            border-bottom: 1px solid transparent;
        }

        .back-link:hover {
            color: #fff;
            border-bottom-color: var(--gold);
        }

        .disclosure-mini {
            font-size: 0.65rem;
            color: var(--steel);
            margin-top: 16px;
        }

        /* ── 响应式 ── */
        @media (max-width: 500px) {
            .subscribe-card {
                padding: 32px 20px;
            }

            .sub-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="subscribe-card">
        <!-- Logo -->
        <div class="logo">NextGen <span>Essentials</span></div>

        <!-- 标题 -->
        <h1 class="sub-title">📬 Get the Newsletter</h1>
        <p class="sub-desc">One email a week. No spam. Just honest reviews and gear we actually recommend.</p>

        <!-- ★ 表单：用 FormSubmit 免费版 ★ -->
        <form action="https://formsubmit.co/nextgenlabs.us@gmail.com" method="POST">
            <!-- 提交后跳转到感谢页 -->
            <input type="hidden" name="_next" value="https://nxgenpicks.com/subscribe-success.html">
            <!-- 自定义邮件主题 -->
            <input type="hidden" name="_subject" value="New Newsletter Subscription">

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@email.com" required>
            </div>

            <div class="form-group">
                <label for="name">First Name <span style="color:var(--steel);font-weight:400;">(optional)</span></label>
                <input type="text" id="name" name="name" placeholder="Your name">
            </div>

            <button type="submit" class="submit-btn">Subscribe →</button>
        </form>

        <a href="/" class="back-link">← Back to Home</a>
        <div class="disclosure-mini">As an Amazon Associate, we earn from qualifying purchases.</div>
    </div>
</body>
</html>
