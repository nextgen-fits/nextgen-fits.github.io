<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe — NextGen Essentials</title>
    <meta name="description" content="Subscribe to the NextGen Essentials newsletter — one email a week, no spam, just honest gear reviews and recommendations.">
    <link rel="canonical" href="https://nxgenpicks.com/subscribe.html" />

    <style>
        :root {
            --ink: #0A0A0B;
            --gold: #C9A961;
            --steel: #6B6D70;
            --line: #232325;
            --card: #111113;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--ink);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .subscribe-box {
            max-width: 480px;
            width: 100%;
            background: var(--card);
            border: 1px solid var(--line);
            padding: 48px 40px;
            border-radius: 2px;
            text-align: center;
        }

        .subscribe-box .logo {
            font-family: "Fraunces", Georgia, serif;
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 4px;
        }
        .subscribe-box .logo span { color: var(--gold); }

        h1 {
            font-family: "Fraunces", Georgia, serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .sub-desc {
            color: var(--steel);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label {
            display: block;
            font-size: 0.72rem;
            color: var(--steel);
            margin-bottom: 6px;
            letter-spacing: 0.04em;
        }
        .form-group input {
            width: 100%;
            background: var(--ink);
            border: 1px solid var(--line);
            padding: 12px 14px;
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            border-radius: 2px;
        }
        .form-group input:focus { outline: none; border-color: var(--gold); }

        .submit-btn {
            width: 100%;
            background: var(--gold);
            border: none;
            color: #000;
            padding: 14px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s ease;
            margin-top: 8px;
        }
        .submit-btn:hover { background: #D9B971; }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--steel);
            font-size: 0.78rem;
            text-decoration: none;
        }
        .back-link:hover { color: #fff; }

        .disclosure-mini {
            font-size: 0.65rem;
            color: var(--steel);
            margin-top: 16px;
        }

        @media screen and (max-width: 500px) {
            .subscribe-box { padding: 32px 20px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="subscribe-box">

        <div class="logo">NextGen <span>Essentials</span></div>
        <h1>📬 Get the Newsletter</h1>
        <p class="sub-desc">One email a week. No spam. Just honest reviews and gear we actually recommend.</p>

        <!-- 使用同一个 Formspree 表单，通过 hidden 字段区分来源 -->
        <form action="https://formspree.io/f/mnnqgqzo" method="POST">
            <input type="hidden" name="_subject" value="Newsletter Subscription">
            <input type="hidden" name="source" value="subscribe-page">

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@email.com" required>
            </div>

            <div class="form-group">
                <label for="name">First Name <span style="color:var(--steel);font-weight:400;">(optional)</span></label>
                <input type="text" id="name" name="name" placeholder="Your name">
            </div>

            <button type="submit" class="submit-btn">Subscribe →</button>
        </form>

        <a href="/" class="back-link">← Back to Home</a>
        <div class="disclosure-mini">As an Amazon Associate, we earn from qualifying purchases.</div>
    </div>

</body>
</html>
