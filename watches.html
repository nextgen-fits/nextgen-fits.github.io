<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FN2QCCZ8TL"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-FN2QCCZ8TL');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horology Mods, Tear-downs & Reviews | NextGen Essentials</title>
    <meta name="description" content="Affordable automatic mechanical watch custom mods, movement tear-downs, and elite tactical horology reviews under $200.">
    <style>
        :root { --bg-color: #000000; --accent-gold: #d4af37; --text-main: #ffffff; --text-muted: #8e8e93; --card-bg: #09090b; --border-color: #1c1c1e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; height: 60px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; text-decoration: none; font-size: 0.85em; }
        .nav-logo span { color: var(--accent-gold); }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-left: 15px; }
        .nav-links a.active { color: #fff; border-bottom: 1px solid var(--accent-gold); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 100px 20px 60px 20px; }
        .seo-intro { margin-bottom: 40px; border-left: 2px solid var(--accent-gold); padding-left: 15px; }
        .seo-intro h1 { font-size: 1.8em; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .seo-intro p { color: var(--text-muted); font-size: 0.9em; }

        /* 🎚️ 双列矩阵流布局 */
        .watch-grid { display: block; }
        .watch-card { background: var(--card-bg); border: 1px solid var(--border-color); margin-bottom: 25px; display: block; text-decoration: none; color: inherit; }
        .watch-img-box { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #050505; }
        .watch-img-box img { width: 100%; height: 100%; object-fit: cover; filter: brightness(80%); }
        .watch-info { padding: 25px; }
        .watch-meta { font-size: 0.55em; font-weight: 700; letter-spacing: 2px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .watch-title { font-size: 1.2em; font-weight: 700; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        .watch-summary { color: var(--text-muted); font-size: 0.82em; text-align: justify; margin-bottom: 20px; }
        .watch-btn { display: inline-block; background: transparent; border: 1px solid #2c2c2e; color: #fff; padding: 10px 20px; font-size: 0.65em; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; width: 100%; text-align: center; }
        
        @media screen and (min-width: 769px) {
            .seo-intro h1 { font-size: 2.4em; }
            .watch-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
            .watch-card { margin-bottom: 0; }
            .watch-card:hover { border-color: var(--accent-gold); }
            .watch-card:hover .watch-btn { background: #fff; color: #000; border-color: #fff; }
        }
        footer { text-align: center; padding: 40px 0; font-size: 0.65em; color: var(--text-muted); border-top: 1px solid var(--border-color); letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">NextGen <span>Essentials</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="watches.html" class="active">Watches</a>
                <a href="apparel.html">Apparel</a>
                <a href="gear.html">Gear</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="seo-intro">
            <h1>Horology Blueprint & Mechanical Reviews</h1>
            <p>Deconstructing automatic movements, custom design assembly aesthetics, and tactical tool watch engineering criteria. No hype, just specs.</p>
        </div>
        <div class="watch-grid" id="watch-feed-container"></div>
        <footer><p>&copy; 2026 NextGen Essentials. Horology Pipeline Matrix.</p></footer>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("watch-feed-container");
            fetch('watches.json?v=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = "";
                    data.forEach(item => {
                        container.innerHTML += `
                            <a href="${item.url}" target="_blank" class="watch-card">
                                <div class="watch-img-box"><img src="${item.cover_img}" alt="${item.title}" loading="lazy"></div>
                                <div class="watch-info">
                                    <span class="watch-meta">${item.date} // ${item.category}</span>
                                    <h2 class="watch-title">${item.title}</h2>
                                    <p class="watch-summary">${item.summary}</p>
                                    <div class="watch-btn">Read Blueprint & Buy →</div>
                                </div>
                            </a>
                        `;
                    });
                }).catch(err => { container.innerHTML = "<p>Loading Workspace Matrix...</p>"; });
        });
    </script>
</body>
</html>
